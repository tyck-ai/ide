[package]
name = "tapp"
version = "0.1.0"
edition = "2021"
description = "SDK for building Tapp extensions for Tyck IDE"
license = "MIT"
repository = "https://github.com/tyck-dev/tapp"
keywords = ["tapp", "tyck", "wasm", "extension", "plugin"]
categories = ["development-tools", "wasm"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tapp-macros = { path = "../tapp-macros" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wit-bindgen = "0.36"

[dev-dependencies]
# For testing

[features]
default = []
