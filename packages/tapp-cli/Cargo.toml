[package]
name = "tapp-cli"
version = "0.1.0"
edition = "2021"
description = "CLI tool for building Tapp extensions for Tyck IDE"
license = "MIT"

[[bin]]
name = "tapp"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
notify = "7"
colored = "2"
dirs = "5"
chrono = "0.4"
